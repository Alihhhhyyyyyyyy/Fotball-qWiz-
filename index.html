<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعرف اللاعب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- شاشة البداية -->
        <div id="start-screen" class="screen">
            <div class="top-bar">
                <button class="icon-btn" id="settings-btn">⚙️</button>
                <div class="stats">
                    <div class="stat">🏆 <span id="highscore">0</span></div>
                    <div class="stat">💰 <span id="cash">100</span></div>
                </div>
                <button class="icon-btn" id="leaderboard-btn">📊</button>
            </div>

            <div class="logo">
                <img src="https://i.postimg.cc/bJs4zzxS/1000060703.png" alt="شعار">
            </div>

            <div class="level-box">
                <div class="level-badge" id="level-name">مبتدئ</div>
                <div class="xp-bar">
                    <div class="xp-fill" id="xp-fill" style="width: 0%"></div>
                </div>
            </div>

            <button class="play-btn" id="play-btn">ابدأ اللعب</button>
        </div>

        <!-- باقي الشاشات (نفس الكود القديم) -->
        <!-- ... -->
    </div>

    <script src="script.js"></script>
</body>
</html>
