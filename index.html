<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خمن اللاعب - Guess the Player</title>
    <style>
        /* كل الـ CSS هنا زي ما هو */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            overflow-y: auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .screen.active {
            display: block;
        }

        #splash-screen {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #splash-screen.active {
            display: flex;
        }

        .splash-content {
            text-align: center;
            color: white;
        }

        .ball-animation {
            font-size: 80px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: #4CAF50;
            animation: loading 2s linear forwards;
        }

        @keyframes loading {
            to { width: 100%; }
        }

        #main-screen .header {
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .coins {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        .menu-btn {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
            width: 100%;
            justify-content: center;
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        .menu-btn span {
            font-size: 24px;
        }

        .play-btn {
            background: #4CAF50;
            color: white;
        }

        .levels-btn {
            background: #FF9800;
            color: white;
        }

        .leaderboard-btn {
            background: #9C27B0;
            color: white;
        }

        .settings-btn {
            background: #607D8B;
            color: white;
        }

        .achievements-btn {
            background: #FF6B6B;
            color: white;
        }

        .game-header {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 50%;
        }

        .back-btn:active {
            background: rgba(255,255,255,0.2);
        }

        .level-info, .score-info {
            font-size: 16px;
            font-weight: bold;
        }

        .timer-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            position: relative;
            margin: 10px 0;
        }

        .timer-bar {
            height: 100%;
            background: #4CAF50;
            width: 100%;
            transition: width 1s linear;
        }

        .timer-text {
            position: absolute;
            top: -25px;
            left: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .player-image-container {
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .player-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid white;
            margin: 0 auto;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #ddd;
        }

        .player-image.blurred {
            filter: blur(10px);
        }

        .player-image.revealed {
            filter: blur(0);
        }

        .hint-btn {
            background: #FFC107;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .hint-btn:active {
            transform: scale(0.95);
            background: #FFA000;
        }

        .hint-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .hint-display {
            padding: 15px;
            margin: 10px;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            text-align: center;
            min-height: 60px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .option-btn {
            background: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .option-btn.correct {
            background: #4CAF50;
            color: white;
        }

        .option-btn.wrong {
            background: #f44336;
            color: white;
        }

        .option-btn.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .streak-counter {
            text-align: center;
            padding: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .levels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .level-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .level-item:active:not(.locked) {
            transform: scale(0.95);
        }

        .level-item.locked {
            background: rgba(255,255,255,0.3);
            color: #999;
            cursor: not-allowed;
        }

        .level-item.completed {
            background: #4CAF50;
            color: white;
        }

        .level-item.current {
            background: #FF9800;
            color: white;
            border: 3px solid white;
        }

        .level-stars {
            color: gold;
            font-size: 12px;
            margin-top: 5px;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .achievement-item {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .achievement-item.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }

        .achievement-item.unlocked {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
        }

        .achievement-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .achievement-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .achievement-desc {
            font-size: 12px;
            opacity: 0.8;
        }

        .achievement-progress {
            margin-top: 10px;
            height: 5px;
            background: rgba(0,0,0,0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s;
        }

        .achievement-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 20px;
        }

        .leaderboard-list {
            padding: 20px;
        }

        .leaderboard-item {
            background: rgba(255,255,255,0.9);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leaderboard-rank {
            font-size: 20px;
            font-weight: bold;
            color: #4CAF50;
        }

        .leaderboard-name {
            font-size: 18px;
        }

        .leaderboard-score {
            font-size: 18px;
            font-weight: bold;
            color: #FF9800;
        }

        .settings-options {
            padding: 20px;
        }

        .setting-item {
            background: rgba(255,255,255,0.9);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4CAF50;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .reset-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .reset-btn:active {
            transform: scale(0.98);
            background: #d32f2f;
        }

        .app-version {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.8;
        }

        .result-overlay {
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .result-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            animation: popIn 0.3s;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .result-card.correct {
            border-top: 5px solid #4CAF50;
        }

        .result-card.wrong {
            border-top: 5px solid #f44336;
        }

        .result-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .result-message {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }

        .result-points {
            font-size: 20px;
            color: #FF9800;
            margin-bottom: 20px;
        }

        .result-next-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .result-next-btn:active {
            transform: scale(0.95);
            background: #45a049;
        }

        .new-achievement {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            animation: slideIn 0.5s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from { transform: translate(-50%, -30%); opacity: 0; }
            to { transform: translate(-50%, -50%); opacity: 1; }
        }

        @media (max-width: 480px) {
            .menu-btn {
                padding: 15px;
                font-size: 18px;
            }
            
            .levels-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .player-image {
                width: 150px;
                height: 150px;
            }
            
            .options-container {
                grid-template-columns: 1fr;
            }

            .achievements-grid {
                grid-template-columns: 1fr;
            }
        }

        .hint {
            padding: 10px;
            margin: 5px;
            background: #e3f2fd;
            border-radius: 10px;
            border-right: 4px solid #2196F3;
        }

        .bonus-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: gold;
            color: #333;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            z-index: 2000;
            animation: bonusPop 1s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        @keyframes bonusPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .footer {
            position: fixed;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        .share-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .share-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <!-- شاشة البداية -->
    <div id="splash-screen" class="screen active">
        <div class="splash-content">
            <div class="ball-animation">⚽</div>
            <h1>خمن اللاعب</h1>
            <p>Guess the Player</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- الشاشة الرئيسية -->
    <div id="main-screen" class="screen">
        <div class="header">
            <h1>⚽ خمن اللاعب</h1>
            <div class="coins">
                <span>💰</span>
                <span id="coin-count">0</span>
            </div>
        </div>
        
        <div class="menu-buttons">
            <button onclick="window.startGame()" class="menu-btn play-btn">
                <span>▶️</span>
                ابدأ اللعب
            </button>
            
            <button onclick="window.showLevels()" class="menu-btn levels-btn">
                <span>📊</span>
                المستويات
            </button>

            <button onclick="window.showAchievements()" class="menu-btn achievements-btn">
                <span>🏆</span>
                الإنجازات
            </button>
            
            <button onclick="window.showLeaderboard()" class="menu-btn leaderboard-btn">
                <span>🏆</span>
                أفضل اللاعبين
            </button>
            
            <button onclick="window.showSettings()" class="menu-btn settings-btn">
                <span>⚙️</span>
                الإعدادات
            </button>
        </div>
        <div class="footer">© 2024 خمن اللاعب - جميع الحقوق محفوظة</div>
    </div>

    <!-- شاشة اللعب -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <button onclick="window.goBack()" class="back-btn">🔙</button>
            <div class="level-info">المستوى <span id="current-level">1</span>/<span id="total-levels">20</span></div>
            <div class="score-info">🏆 <span id="current-score">0</span></div>
        </div>

        <div class="timer-container">
            <div class="timer-bar" id="timer-bar"></div>
            <div class="timer-text" id="timer-text">15</div>
        </div>

        <div class="player-image-container">
            <div id="player-image" class="player-image blurred"></div>
            <div class="hint-button-container">
                <button onclick="window.useHint()" class="hint-btn" id="hint-btn">
                    💡 تلميح (<span id="hint-count">10</span>)
                </button>
            </div>
        </div>

        <div class="hint-display" id="hint-display"></div>

        <div class="options-container" id="options-container"></div>

        <div class="streak-counter" id="streak-counter">
            🔥 السلسلة: <span id="streak-count">0</span>
        </div>
    </div>

    <!-- شاشة المستويات -->
    <div id="levels-screen" class="screen">
        <div class="game-header">
            <button onclick="window.goBack()" class="back-btn">🔙</button>
            <h2>المستويات</h2>
            <div></div>
        </div>
        <div class="levels-grid" id="levels-grid"></div>
    </div>

    <!-- شاشة الإنجازات -->
    <div id="achievements-screen" class="screen">
        <div class="game-header">
            <button onclick="window.goBack()" class="back-btn">🔙</button>
            <h2>🏆 الإنجازات</h2>
            <div></div>
        </div>
        <div class="achievements-grid" id="achievements-grid"></div>
    </div>

    <!-- شاشة أفضل اللاعبين -->
    <div id="leaderboard-screen" class="screen">
        <div class="game-header">
            <button onclick="window.goBack()" class="back-btn">🔙</button>
            <h2>🏆 أفضل اللاعبين</h2>
            <div></div>
        </div>
        <div class="leaderboard-list" id="leaderboard-list">
            <button onclick="window.shareScore()" class="share-btn">
                <span>📱</span> شارك نتيجتك على واتساب
            </button>
        </div>
    </div>

    <!-- شاشة الإعدادات -->
    <div id="settings-screen" class="screen">
        <div class="game-header">
            <button onclick="window.goBack()" class="back-btn">🔙</button>
            <h2>⚙️ الإعدادات</h2>
            <div></div>
        </div>
        
        <div class="settings-options">
            <div class="setting-item">
                <span>🔊 المؤثرات الصوتية</span>
                <label class="switch">
                    <input type="checkbox" id="sound-effect" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="setting-item">
                <span>🌙 الوضع الليلي</span>
                <label class="switch">
                    <input type="checkbox" id="dark-mode">
                    <span class="slider"></span>
                </label>
            </div>
            
            <button onclick="window.resetProgress()" class="reset-btn">
                🔄 إعادة تعيين التقدم
            </button>
            
            <div class="app-version">
                الإصدار 3.0.0
            </div>
        </div>
    </div>

    <!-- شاشة النتيجة -->
    <div id="result-screen" class="screen result-overlay">
        <div class="result-card" id="result-card"></div>
    </div>

                id: 1, 
                name: "بداية قوية", 
                desc: "احصل على أول إجابة صحيحة",
                icon: "🎯",
                condition: (stats) => stats.correctAnswers >= 1,
                progress: (stats) => Math.min(100, (stats.correctAnswers / 1) * 100)
            },
            { 
                id: 2, 
                name: "سلسلة ذهبية", 
                desc: "احصل على 3 إجابات متتالية",
                icon: "🔥",
                condition: (stats) => stats.maxStreak >= 3,
                progress: (stats) => Math.min(100, (stats.maxStreak / 3) * 100)
            },
            { 
                id: 3, 
                name: "جامع النقاط", 
                desc: "اجمع 100 نقطة",
                icon: "💰",
                condition: (stats) => stats.totalScore >= 100,
                progress: (stats) => Math.min(100, (stats.totalScore / 100) * 100)
            },
            { 
                id: 4, 
                name: "متذوق كرة القدم", 
                desc: "خمن 10 لاعبين صح",
                icon: "⚽",
                condition: (stats) => stats.correctAnswers >= 10,
                progress: (stats) => Math.min(100, (stats.correctAnswers / 10) * 100)
            },
            { 
                id: 5, 
                name: "خبير التلميحات", 
                desc: "استخدم 5 تلميحات",
                icon: "💡",
                condition: (stats) => stats.hintsUsed >= 5,
                progress: (stats) => Math.min(100, (stats.hintsUsed / 5) * 100)
            },
            { 
                id: 6, 
                name: "البطل", 
                desc: "وصل للمستوى 10",
                icon: "🏆",
                condition: (stats) => stats.maxLevel >= 10,
                progress: (stats) => Math.min(100, (stats.maxLevel / 10) * 100)
            }
        ];

        // ==================== إحصائيات اللاعب ====================
        let stats = {
            correctAnswers: 0,
            totalScore: 0,
            maxStreak: 0,
            hintsUsed: 0,
            maxLevel: 1,
            unlockedAchievements: []
        };

        // متغيرات اللعبة
        let currentScreen = 'splash';
        let currentPlayer = null;
        let score = 0;
        let streak = 0;
        let currentLevel = 1;
        let hintsUsed = 0;
        let coins = 0;
        let timerInterval = null;
        let timeLeft = 15;
        let soundsEnabled = true;
        let darkMode = false;
        const totalLevels = 20;
        const maxHints = 10;

        // تهيئة اللعبة
        document.addEventListener('DOMContentLoaded', () => {
            loadGameData();
            loadStats();
            
            setTimeout(() => {
                showScreen('main');
            }, 2000);
            
            document.getElementById('total-levels').textContent = totalLevels;
        });

        // تحميل الإحصائيات
        function loadStats() {
            const savedStats = localStorage.getItem('gameStats');
            if (savedStats) {
                stats = JSON.parse(savedStats);
            }
        }

        // حفظ الإحصائيات
        function saveStats() {
            localStorage.setItem('gameStats', JSON.stringify(stats));
        }

        // التحقق من الإنجازات
        function checkAchievements() {
            achievements.forEach(achievement => {
                if (!stats.unlockedAchievements.includes(achievement.id) && achievement.condition(stats)) {
                    stats.unlockedAchievements.push(achievement.id);
                    showNewAchievement(achievement);
                }
            });
            saveStats();
        }

        // إظهار إنجاز جديد
        function showNewAchievement(achievement) {
            const div = document.createElement('div');
            div.className = 'new-achievement';
            div.innerHTML = `
                <div style="font-size: 60px; margin-bottom: 10px;">${achievement.icon}</div>
                <h2>إنجاز جديد! 🎉</h2>
                <p style="font-size: 20px; margin: 10px 0;">${achievement.name}</p>
                <p style="font-size: 14px;">${achievement.desc}</p>
            `;
            document.body.appendChild(div);
            
            setTimeout(() => {
                div.remove();
            }, 3000);
        }

        // رسم الإنجازات
        function renderAchievements() {
            const grid = document.getElementById('achievements-grid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            achievements.forEach(achievement => {
                const isUnlocked = stats.unlockedAchievements.includes(achievement.id);
                const progress = achievement.progress(stats);
                
                const item = document.createElement('div');
                item.className = `achievement-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                item.innerHTML = `
                    ${isUnlocked ? '<div class="achievement-badge">✅</div>' : ''}
                    <div class="achievement-icon">${achievement.icon}</div>
                    <div class="achievement-name">${achievement.name}</div>
                    <div class="achievement-desc">${achievement.desc}</div>
                    <div class="achievement-progress">
                        <div class="progress-bar" style="width: ${progress}%"></div>
                    </div>
                `;
                
                grid.appendChild(item);
            });
        }

        // دالة إظهار الشاشات
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            
            const targetScreen = document.getElementById(screenId + '-screen');
            if (targetScreen) {
                targetScreen.classList.add('active');
                currentScreen = screenId;
                
                if (screenId === 'main') {
                    updateUI();
                } else if (screenId === 'game') {
                    startLevel();
                } else if (screenId === 'levels') {
                    renderLevels();
                } else if (screenId === 'achievements') {
                    renderAchievements();
                } else if (screenId === 'leaderboard') {
                    renderLeaderboard();
                } else if (screenId === 'settings') {
                    loadSettings();
                }
            }
        }

        // تحديث واجهة المستخدم
        function updateUI() {
            document.getElementById('coin-count').textContent = coins;
            document.getElementById('current-score').textContent = score;
            document.getElementById('streak-count').textContent = streak;
            document.getElementById('hint-count').textContent = maxHints - hintsUsed;
        }

        // العودة للشاشة الرئيسية
        function goBack() {
            if (currentScreen === 'game') {
                clearTimer();
            }
            showScreen('main');
        }

        // بدء اللعبة
        function startGame() {
            currentLevel = 1;
            score = 0;
            streak = 0;
            hintsUsed = 0;
            coins = 0;
            showScreen('game');
        }

        // بدء مستوى
        function startLevel() {
            clearTimer();
            
            const availablePlayers = players.filter(p => p.level <= currentLevel);
            if (availablePlayers.length > 0) {
                const randomIndex = Math.floor(Math.random() * availablePlayers.length);
                currentPlayer = availablePlayers[randomIndex];
                
                // تحديث صورة اللاعب من مجلد images
                const playerImage = document.getElementById('player-image');
                if (currentPlayer.image) {
                    playerImage.style.backgroundImage = `url('${currentPlayer.image}')`;
                }
                
                generateOptions();
                
                document.getElementById('current-level').textContent = currentLevel;
                document.getElementById('current-score').textContent = score;
                playerImage.className = 'player-image blurred';
                document.getElementById('hint-display').innerHTML = '';
                document.getElementById('hint-btn').disabled = false;
                document.getElementById('hint-count').textContent = maxHints - hintsUsed;
                
                startTimer(15);
            }
        }

        // إنشاء الخيارات
        function generateOptions() {
            let options = [currentPlayer.name];
            const otherPlayers = players.filter(p => p.id !== currentPlayer.id);
            
            while (options.length < 4 && otherPlayers.length > 0) {
                const randomIndex = Math.floor(Math.random() * otherPlayers.length);
                const randomName = otherPlayers[randomIndex].name;
                
                if (!options.includes(randomName)) {
                    options.push(randomName);
                }
                
                otherPlayers.splice(randomIndex, 1);
            }
            
            // خلط الخيارات
            options = shuffleArray(options);
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option;
                button.onclick = () => checkAnswer(option);
                container.appendChild(button);
            });
        }

        // خلط المصفوفة
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // بدء المؤقت
        function startTimer(seconds) {
            timeLeft = seconds;
            document.getElementById('timer-text').textContent = timeLeft;
            document.getElementById('timer-bar').style.width = '100%';
            document.getElementById('timer-bar').style.background = '#4CAF50';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').textContent = timeLeft;
                document.getElementById('timer-bar').style.width = (timeLeft / seconds) * 100 + '%';
                
                if (timeLeft <= 5) {
                    document.getElementById('timer-bar').style.background = '#f44336';
                }
                
                if (timeLeft <= 0) {
                    clearTimer();
                    showResult('timeout');
                }
            }, 1000);
        }

        // إيقاف المؤقت
        function clearTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // التحقق من الإجابة
        function checkAnswer(selected) {
            clearTimer();
            
            const options = document.querySelectorAll('.option-btn');
            let pointsEarned = 0;
            
            if (selected === currentPlayer.name) {
                streak++;
                pointsEarned = 10;
                
                // تحديث الإحصائيات
                stats.correctAnswers++;
                stats.totalScore += pointsEarned;
                if (streak > stats.maxStreak) {
                    stats.maxStreak = streak;
                }
                
                if (streak % 3 === 0) {
                    pointsEarned += 20;
                    showBonusMessage('🔥 سلسلة! +20 نقطة!');
                }
                
                score += pointsEarned;
                coins += 5;
                
                options.forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add('disabled');
                    if (btn.textContent === currentPlayer.name) {
                        btn.classList.add('correct');
                    }
                });
                
                document.getElementById('player-image').className = 'player-image revealed';
                showResult('correct', pointsEarned);
            } else {
                streak = 0;
                
                options.forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add('disabled');
                    if (btn.textContent === selected) {
                        btn.classList.add('wrong');
                    }
                    if (btn.textContent === currentPlayer.name) {
                        btn.classList.add('correct');
                    }
                });
                
                document.getElementById('player-image').className = 'player-image revealed';
                showResult('wrong');
            }
            
            // تحديث المستوى الأقصى
            if (currentLevel > stats.maxLevel) {
                stats.maxLevel = currentLevel;
            }
            
            updateUI();
            checkAchievements();
            saveGameData();
            saveStats();
        }

        // إظهار رسالة المكافأة
        function showBonusMessage(message) {
            const bonusDiv = document.createElement('div');
            bonusDiv.className = 'bonus-message';
            bonusDiv.textContent = message;
            document.body.appendChild(bonusDiv);
            
            setTimeout(() => {
                bonusDiv.remove();
            }, 2000);
        }

        // إظهار النتيجة
        function showResult(type, points = 0) {
            const resultCard = document.getElementById('result-card');
            const resultScreen = document.getElementById('result-screen');
            
            let icon, message, pointsText;
            
            if (type === 'correct') {
                icon = '🎉';
                message = 'إجابة صحيحة!';
                pointsText = `+${points} نقطة`;
                resultCard.className = 'result-card correct';
            } else if (type === 'wrong') {
                icon = '😞';
                message = 'إجابة خاطئة!';
                pointsText = `الإجابة: ${currentPlayer.name}`;
                resultCard.className = 'result-card wrong';
            } else {
                icon = '⏰';
                message = 'انتهى الوقت!';
                pointsText = `الإجابة: ${currentPlayer.name}`;
                resultCard.className = 'result-card wrong';
            }
            
            resultCard.innerHTML = `
                <div class="result-icon">${icon}</div>
                <div class="result-message">${message}</div>
                <div class="result-points">${pointsText}</div>
                <button class="result-next-btn" onclick="window.nextLevel()">التالي</button>
            `;
            
            resultScreen.classList.add('active');
        }

        // المستوى التالي
        function nextLevel() {
            document.getElementById('result-screen').classList.remove('active');
            
            if (currentLevel < totalLevels) {
                currentLevel++;
                startLevel();
            } else {
                alert('🎉 مبروك! أكملت جميع المستويات!');
                showScreen('main');
            }
        }

        // استخدام تلميح
        function useHint() {
            if (hintsUsed >= maxHints) {
                alert('😞 لقد استنفدت جميع التلميحات!');
                return;
            }
            
            hintsUsed++;
            stats.hintsUsed++;
            
            const hints = [
                `النادي: ${currentPlayer.club}`,
                `البلد: ${currentPlayer.nationality}`,
                `المركز: ${currentPlayer.position}`
            ];
            
            const randomHint = hints[Math.floor(Math.random() * hints.length)];
            
            document.getElementById('hint-display').innerHTML = `
                <div class="hint">💡 ${randomHint}</div>
            `;
            
            document.getElementById('hint-count').textContent = maxHints - hintsUsed;
            
            if (hintsUsed >= maxHints) {
                document.getElementById('hint-btn').disabled = true;
            }
            
            checkAchievements();
            saveGameData();
            saveStats();
        }

        // عرض المستويات
        function showLevels() {
            showScreen('levels');
        }

        // عرض الإنجازات
        function showAchievements() {
            showScreen('achievements');
        }

        // رسم المستويات
        function renderLevels() {
            const grid = document.getElementById('levels-grid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= totalLevels; i++) {
                const levelItem = document.createElement('div');
                levelItem.className = 'level-item';
                
                if (i < currentLevel) {
                    levelItem.classList.add('completed');
                    levelItem.innerHTML = `<span>${i}</span><div class="level-stars">⭐⭐⭐</div>`;
                } else if (i === currentLevel) {
                    levelItem.classList.add('current');
                    levelItem.innerHTML = `<span>${i}</span>`;
                } else {
                    levelItem.classList.add('locked');
                    levelItem.innerHTML = `<span>🔒 ${i}</span>`;
                }
                
                levelItem.onclick = () => {
                    if (i <= currentLevel) {
                        currentLevel = i;
                        showScreen('game');
                    }
                };
                
                grid.appendChild(levelItem);
            }
        }

        // عرض أفضل اللاعبين
        function showLeaderboard() {
            showScreen('leaderboard');
        }

        // رسم أفضل اللاعبين
        function renderLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            
            const leaderboard = [
                { rank: 1, name: 'أحمد محمد', score: 1250 },
                { rank: 2, name: 'عمر حسن', score: 1100 },
                { rank: 3, name: 'سارة أحمد', score: 950 }
            ];
            
            let html = leaderboard.map(player => `
                <div class="leaderboard-item">
                    <div class="leaderboard-rank">#${player.rank}</div>
                    <div class="leaderboard-name">${player.name}</div>
                    <div class="leaderboard-score">${player.score}</div>
                </div>
            `).join('');
            
            // إضافة زر المشاركة
            html += `
                <button onclick="window.shareScore()" class="share-btn">
                    <span>📱</span> شارك نتيجتك على واتساب
                </button>
            `;
            
            list.innerHTML = html;
        }

        // مشاركة النتيجة على واتساب
        function shareScore() {
            const text = `🏆 أنا في المستوى ${currentLevel} وعندي ${score} نقطة في لعبة خمن اللاعب! جرب تلعب وتتحداني؟ ⚽`;
            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(whatsappUrl, '_blank');
        }

        // عرض الإعدادات
        function showSettings() {
            showScreen('settings');
        }

        // تحميل الإعدادات
        function loadSettings() {
            document.getElementById('sound-effect').checked = soundsEnabled;
            document.getElementById('dark-mode').checked = darkMode;
            
            if (darkMode) {
                document.body.style.background = '#333';
            } else {
                document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }
        }

        // إعادة تعيين التقدم
        function resetProgress() {
            if (confirm('⚠️ هل أنت متأكد؟')) {
                score = 0;
                streak = 0;
                currentLevel = 1;
                hintsUsed = 0;
                coins = 0;
                
                stats = {
                    correctAnswers: 0,
                    totalScore: 0,
                    maxStreak: 0,
                    hintsUsed: 0,
                    maxLevel: 1,
                    unlockedAchievements: []
                };
                
                saveGameData();
                saveStats();
                updateUI();
                alert('✅ تم إعادة التعيين');
                showScreen('main');
            }
        }

        // حفظ البيانات
        function saveGameData() {
            const gameData = { score, streak, currentLevel, hintsUsed, coins, soundsEnabled, darkMode };
            localStorage.setItem('gameData', JSON.stringify(gameData));
        }

        // تحميل البيانات
        function loadGameData() {
            try {
                const savedData = localStorage.getItem('gameData');
                if (savedData) {
                    const gameData = JSON.parse(savedData);
                    score = gameData.score || 0;
                    streak = gameData.streak || 0;
                    currentLevel = gameData.currentLevel || 1;
                    hintsUsed = gameData.hintsUsed || 0;
                    coins = gameData.coins || 0;
                    soundsEnabled = gameData.soundsEnabled !== false;
                    darkMode = gameData.darkMode || false;
                }
            } catch (e) {
                console.log('لا توجد بيانات محفوظة');
            }
        }

        // ربط الدوال بالـ window
        window.showScreen = showScreen;
        window.startGame = startGame;
        window.showLevels = showLevels;
        window.showAchievements = showAchievements;
        window.showLeaderboard = showLeaderboard;
        window.showSettings = showSettings;
        window.goBack = goBack;
        window.useHint = useHint;
        window.nextLevel = nextLevel;
        window.resetProgress = resetProgress;
        window.checkAnswer = checkAnswer;
        window.shareScore = shareScore;
    </script>
</body>
</html>
