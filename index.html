<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعرف اللاعب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-texture"></div>
    <div class="game-wrapper">
        <!-- Start Screen -->
        <div class="screen" id="start-screen">
            <div class="logo-container">
                <h1 class="game-title">اعرف<span class="title-highlight">اللاعب</span></h1>
                <div class="title-underline"></div>
            </div>
            <div class="menu">
                <button class="menu-btn" id="play-btn"><span>ابدأ اللعب</span></button>
                <button class="menu-btn secondary" id="leaderboard-btn"><span>لوحة الصدارة</span></button>
                <button class="menu-btn secondary" id="settings-btn"><span>الإعدادات</span></button>
            </div>
        </div>

        <!-- Game Screen -->
        <div class="screen hidden" id="game-container">
            <!-- ... (محتويات شاشة اللعب لم تتغير) ... -->
        </div>

        <!-- End Screen -->
        <div class="screen hidden" id="end-screen">
            <!-- ... (محتويات شاشة النهاية لم تتغير) ... -->
        </div>
    </div>
    <div class="result-overlay" id="result-overlay"><div class="result-text" id="result-text"></div></div>
    <script src="script.js"></script>
</body>
</html>
