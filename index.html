<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعرف اللاعب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@700&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- The main game wrapper will now act as the screen container -->
    <div class="game-wrapper">
        
        <!-- Start Screen -->
        <div class="screen" id="start-screen">
            <div class="top-bar">
                <button class="icon-btn" id="settings-btn">⚙️</button>
                <div class="resources">
                    <div class="resource-item" id="score-display">
                        <span>🏆</span>
                        <div class="resource-value">0</div>
                    </div>
                    <div class="resource-item" id="cash-display">
                        <span>💲</span>
                        <div class="resource-value">100</div>
                        <button class="add-btn">+</button>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="logo-container">
                    <!-- ضع رابط صورة الشعار هنا -->
                    <img src="https://i.ibb.co/p3Z5yG3/logo-placeholder.png" alt="Game Logo" class="game-logo">
                </div>
                <button class="play-btn" id="play-btn">
                    <span>▶</span> Play
                </button>
            </div>
        </div>

        <!-- Game Screen (سيتم تصميمه لاحقًا ليتناسب مع الهوية الجديدة) -->
        <div class="screen hidden" id="game-container">
            <!-- المحتوى القديم لشاشة اللعب هنا -->
        </div>

        <!-- End Screen (سيتم تصميمه لاحقًا ليتناسب مع الهوية الجديدة) -->
        <div class="screen hidden" id="end-screen">
            <!-- المحتوى القديم لشاشة النهاية هنا -->
        </div>

    </div>

    <div class="result-overlay" id="result-overlay"><div class="result-text" id="result-text"></div></div>
    <script src="script.js"></script>
</body>
</html>
